<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Мій кабінет — VA HOME</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="favicon/favicon.ico">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/account.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div id="site-header" data-root="" data-active="account">
</div>
<main id="main-content" class="account-page">
<div class="container">
<section id="accountAuth" class="account-auth">
<div>
<p class="eyebrow">VA HOME</p>
<h1>Особистий кабінет</h1>
<p>Замовлення, улюблені аромати та повторна покупка — в одному місці.</p>
</div>
<form id="accountForm" class="account-form">
<div class="account-switch">
<button type="button" class="is-active" data-auth-mode="login">Вхід</button>
<button type="button" data-auth-mode="signup">Реєстрація</button>
</div>
<label>Email<input name="email" type="email" autocomplete="email" required>
</label>
<label>Пароль<input name="password" type="password" minlength="6" autocomplete="current-password" required>
</label>
<button id="accountSubmit" class="btn btn-primary btn-block" type="submit">Увійти</button>
<p id="accountMessage" class="account-message" role="status">
</p>
</form>
</section>
<section id="accountDashboard" hidden>
<div class="account-head">
<div>
<p class="eyebrow">VA HOME</p>
<h1>Ваш простір</h1>
<p id="accountEmail">
</p>
</div>
<button id="accountLogout" class="btn btn-secondary" type="button">Вийти</button>
</div>
<nav class="account-tabs">
<button class="is-active" data-account-tab="orders">Замовлення</button>
<button data-account-tab="wishlist">Список бажань</button>
</nav>
<section id="accountOrders">
<div id="accountOrdersList" class="account-list">
</div>
<p id="accountOrdersEmpty" class="account-empty" hidden>Поки що тут немає замовлень.</p>
</section>
<section id="accountWishlist" hidden>
<form id="wishlistAddForm" class="wishlist-add"><select id="wishlistProduct" aria-label="Оберіть аромат"></select><button class="btn btn-primary" type="submit">Додати аромат</button></form>
<div id="accountWishlistList" class="wishlist-grid">
</div>
<p id="accountWishlistEmpty" class="account-empty" hidden>Додайте сюди аромати, до яких хочеться повернутися.</p>
</section>
</section>
</div>
</main>
<div id="site-footer" data-root="">
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>
<script src="js/config.js">
</script>
<script src="data/products-data.js">
</script>
<script src="js/cart.js">
</script>
<script src="js/main.js" defer>
</script>
<script src="js/account.js" defer>
</script>
</body>
</html>
